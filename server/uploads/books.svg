<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <linearGradient id="booksGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#064e3b" />
      <stop offset="100%" stop-color="#022c22" />
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="url(#booksGrad)" />
  <!-- Open Book design -->
  <path d="M 200,210 Q 160,180 100,190 L 100,100 Q 160,90 200,120 Q 240,90 300,100 L 300,190 Q 240,180 200,210 Z" fill="url(#booksGrad)" stroke="url(#glowGrad)" stroke-width="5" filter="url(#glow)" />
  <!-- Book spine/center -->
  <line x1="200" y1="120" x2="200" y2="210" stroke="#f59e0b" stroke-width="4" />
  <!-- Lines inside book (text representation) -->
  <path d="M 120,125 H 170 M 120,140 H 180 M 120,155 H 175 M 120,170 H 160" stroke="#e2e8f0" stroke-width="2.5" opacity="0.6" />
  <path d="M 280,125 H 230 M 280,140 H 220 M 280,155 H 225 M 280,170 H 240" stroke="#e2e8f0" stroke-width="2.5" opacity="0.6" />
  <!-- Graduation hat or lightbulb representation -->
  <path d="M 200,50 L 230,65 L 200,80 L 170,65 Z" fill="url(#glowGrad)" />
  <line x1="215" y1="57.5" x2="215" y2="85" stroke="#f59e0b" stroke-width="2" />
  <circle cx="215" cy="85" r="3" fill="#f59e0b" />
  <text x="200" y="270" font-family="system-ui, sans-serif" font-weight="bold" font-size="20" fill="#e2e8f0" text-anchor="middle">BOOKS &amp; EDUCATION</text>
</svg>
