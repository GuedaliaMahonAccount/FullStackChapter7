<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <linearGradient id="electGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="url(#electGrad)" />
  <circle cx="200" cy="150" r="80" fill="none" stroke="url(#glowGrad)" stroke-width="4" opacity="0.3" />
  <!-- Microchip design -->
  <rect x="140" y="90" width="120" height="120" rx="10" fill="url(#electGrad)" stroke="url(#glowGrad)" stroke-width="6" filter="url(#glow)" />
  <!-- Pins -->
  <line x1="120" y1="110" x2="140" y2="110" stroke="#06b6d4" stroke-width="4" />
  <line x1="120" y1="130" x2="140" y2="130" stroke="#06b6d4" stroke-width="4" />
  <line x1="120" y1="150" x2="140" y2="150" stroke="#06b6d4" stroke-width="4" />
  <line x1="120" y1="170" x2="140" y2="170" stroke="#06b6d4" stroke-width="4" />
  <line x1="120" y1="190" x2="140" y2="190" stroke="#06b6d4" stroke-width="4" />

  <line x1="260" y1="110" x2="280" y2="110" stroke="#06b6d4" stroke-width="4" />
  <line x1="260" y1="130" x2="280" y2="130" stroke="#06b6d4" stroke-width="4" />
  <line x1="260" y1="150" x2="280" y2="150" stroke="#06b6d4" stroke-width="4" />
  <line x1="260" y1="170" x2="280" y2="170" stroke="#06b6d4" stroke-width="4" />
  <line x1="260" y1="190" x2="280" y2="190" stroke="#06b6d4" stroke-width="4" />

  <!-- Inner circuitry -->
  <rect x="170" y="120" width="60" height="60" rx="4" fill="none" stroke="#3b82f6" stroke-width="3" />
  <circle cx="200" cy="150" r="12" fill="url(#glowGrad)" />
  <text x="200" y="270" font-family="system-ui, sans-serif" font-weight="bold" font-size="20" fill="#e2e8f0" text-anchor="middle">ELECTRONICS</text>
</svg>
