<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <linearGradient id="fashionGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#311042" />
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="url(#fashionGrad)" />
  <!-- Hanger and Clothes outline -->
  <path d="M 200,80 Q 200,60 215,65 Q 225,75 200,90 Z" fill="none" stroke="url(#glowGrad)" stroke-width="4" filter="url(#glow)" />
  <path d="M 120,130 L 200,90 L 280,130 L 260,220 L 140,220 Z" fill="url(#fashionGrad)" stroke="url(#glowGrad)" stroke-width="5" filter="url(#glow)" />
  <line x1="160" y1="220" x2="160" y2="240" stroke="#ec4899" stroke-width="4" />
  <line x1="240" y1="220" x2="240" y2="240" stroke="#ec4899" stroke-width="4" />
  <!-- Decorative stars -->
  <circle cx="90" cy="90" r="3" fill="#fff" opacity="0.8" />
  <circle cx="310" cy="100" r="4" fill="#fff" opacity="0.6" />
  <circle cx="300" cy="210" r="2" fill="#fff" opacity="0.7" />
  <text x="200" y="270" font-family="system-ui, sans-serif" font-weight="bold" font-size="20" fill="#e2e8f0" text-anchor="middle">FASHION &amp; APPAREL</text>
</svg>
